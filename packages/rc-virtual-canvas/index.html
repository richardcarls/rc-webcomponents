<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>rc-virtual-canvas</title>

    <style>
        body {
            padding: 2rem 1rem;
        }

        rc-virtual-canvas {
            width: 100%;
            border: 1px solid black;
            background-color: black;
        }

        #canvas {
            display: block;
            width: 100%;
            aspect-ratio: 4/3;
        }
    </style>

    <script type="module" src="/src/rc-virtual-canvas.ts"></script>
  </head>

  <body>
    <h2>Example: Tilemap</h2>

    <rc-virtual-canvas id="rc-canvas" contentWidth="1600" contentHeight="1600">
        <canvas id="canvas"></canvas>
    </rc-virtual-canvas>

    <script>
        const NUM_ROWS = 50;
        const NUM_COLS = 50;

        const $rcCanvas = document.getElementById('rc-canvas');
        const $canvas = document.getElementById('canvas');

        $rcCanvas.setAttribute('contentWidth', NUM_COLS * 32);
        $rcCanvas.setAttribute('contentHeight', NUM_ROWS * 32);

        const tileset = new Image();
        tileset.src = 'default_tiles.png';

        const tiles = [];
        for (let r = 0; r < NUM_ROWS; r++) {
            for (let c = 0; c < NUM_COLS; c++) {
                tiles.push({ x: c * 32, y: r * 32, tileX: Math.floor(Math.random() * 9) * 32, tileY: Math.floor(Math.random() * 2) * 32 });
            }
        }

        document.getElementById('rc-canvas').addEventListener('render', (e) => {
            const { time, viewRect, contentRect } = e.detail;

            $canvas.width = viewRect.width;
            $canvas.height = viewRect.height;

            const ctx = $canvas.getContext('2d');
            
            ctx.clearRect(0, 0, viewRect.width, viewRect.height);

            // Tiles
            tiles.forEach(({ x, y, tileX, tileY }) => {
                if (x + 32 >= viewRect.x && x <= viewRect.x + viewRect.width) {
                    if (y + 32 >= viewRect.y && y <= viewRect.y + viewRect.height) {
                        ctx.drawImage(tileset, tileX, tileY, 32, 32, x - viewRect.x, y - viewRect.y, 32, 32);
                    }
                }
            });
            
            // Debug Info
            ctx.fillStyle = 'white';
            ctx.font = '16px serif';
            ctx.fillText(`time: ${time}`, 4, 16);
            ctx.fillText(`viewRect: ${viewRect.x}, ${viewRect.y}, ${viewRect.width}, ${viewRect.height}`, 4, 32);
            ctx.fillText(`contentRect: ${contentRect.x}, ${contentRect.y}, ${contentRect.width}, ${contentRect.height}`, 4, 48);
        });
    </script>
  </body>
</html>
