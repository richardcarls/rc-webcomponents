<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>rc-transfer-list</title>
    <link rel="stylesheet" href="/demo.css" />
    <script type="module" src="/demo.js"></script>
    <script type="module" src="/src/define.ts"></script>
    <style>
      rc-transfer-list {
        display: inline-block;
      }

      .rc-transfer-list-root {
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        gap: 0.75em;
        align-items: start;
      }

      .rc-transfer-list-panel {
        display: flex;
        flex-direction: column;
        gap: 0.25em;
      }

      .rc-transfer-list-panel [part~="label"] {
        font-size: 0.875rem;
        font-weight: 500;
        color: GrayText;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }

      rc-transfer-list rc-listbox {
        min-width: 180px;
        height: 220px;
        border: 1px solid ButtonBorder;
        border-radius: 4px;
        overflow-y: auto;
        display: block;
      }

      .rc-transfer-list-actions {
        padding-block-start: 1.5em;
        --rc-toolbar-gap-inline: 0.375em;
      }

      rc-transfer-list button {
        padding: 0.35em 0.75em;
        font-size: 0.875rem;
        border: 1px solid ButtonBorder;
        border-radius: 4px;
        background: ButtonFace;
        color: ButtonText;
        cursor: pointer;
        white-space: nowrap;
      }

      rc-transfer-list button:hover:not(:disabled) {
        background: color-mix(in srgb, ButtonFace 80%, Highlight 20%);
      }

      rc-transfer-list button:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }

      rc-listbox [part~="option"] {
        padding: 0.3em 0.6em;
        cursor: default;
        user-select: none;
      }

      rc-listbox [part~="option"][aria-selected="true"] {
        background: Highlight;
        color: HighlightText;
      }

      rc-listbox [part~="option"][data-active] {
        outline: 2px solid Highlight;
        outline-offset: -2px;
      }
    </style>
  </head>
  <body>
    <main class="demo-page">
      <div class="demo-controls">
        <div class="demo-title">
          <h1>rc-transfer-list</h1>
        </div>
        <button class="theme-picker" type="button">Auto</button>
      </div>

      <div class="demo-section">
        <h2>Basic</h2>
        <p>Backed by a native <code>&lt;select multiple&gt;</code>. Selected options appear in the right panel.
        Transfers reflect back to the <code>&lt;select&gt;</code> for form participation.</p>
        <rc-transfer-list available-label="Available" selected-label="Selected">
          <select multiple name="features">
            <option value="dark-mode">Dark mode</option>
            <option value="notifications">Notifications</option>
            <option value="auto-save">Auto-save</option>
            <option value="spell-check">Spell check</option>
            <option value="word-wrap">Word wrap</option>
            <option value="line-numbers">Line numbers</option>
            <option value="minimap">Minimap</option>
            <option value="breadcrumbs">Breadcrumbs</option>
          </select>
        </rc-transfer-list>
      </div>

      <div class="demo-section">
        <h2>Multi-Selection</h2>
        <p>Set <code>multiple</code> to allow selecting several items before transferring them all at once.</p>
        <rc-transfer-list multiple available-label="Team members" selected-label="Assigned">
          <select multiple name="team">
            <option value="alice">Alice</option>
            <option value="bob">Bob</option>
            <option value="carol">Carol</option>
            <option value="dave">Dave</option>
            <option value="eve">Eve</option>
          </select>
        </rc-transfer-list>
      </div>
    </main>

    <script>
      document.addEventListener('rc-transfer-list-change', (e) => {
        console.log('rc-transfer-list-change:', e.detail);
      });
    </script>
  </body>
</html>
