<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>rc-menu</title>
    <link rel="stylesheet" href="/demo.css" />
    <script type="module" src="/demo.js"></script>
    <script type="module" src="/src/rc-menu.ts"></script>
    <style>
      rc-menu button {
        all: unset;
        display: block;
        width: 100%;
        box-sizing: border-box;
        padding: 0.5em 1em;
        cursor: pointer;
      }
      rc-menu button:hover { background: color-mix(in srgb, currentColor 10%, transparent); }
      rc-menu button:focus-visible { outline: 2px solid Highlight; outline-offset: -2px; }
      rc-menu button[disabled] { opacity: 0.5; cursor: not-allowed; }

      /* Icon+text items: restore flex layout after all:unset resets display */
      rc-menu button.has-icon {
        display: flex;
        align-items: center;
        gap: 0.6em;
      }
      rc-menu button.has-icon svg {
        flex-shrink: 0;
        width: 1em;
        height: 1em;
      }
    </style>
  </head>
  <body>
    <main class="demo-page">
      <div class="demo-controls">
        <div class="demo-title">
          <h1>rc-menu</h1>
          <a href="https://www.w3.org/WAI/ARIA/apg/patterns/menu/">WAI-ARIA Menu Pattern</a>
        </div>
        <button class="theme-picker" type="button">Auto</button>
      </div>

      <div class="demo-section">
        <h2>Basic Menu</h2>
        <rc-menu label="Actions">
          <button onclick="handleAction('cut')">Cut</button>
          <button onclick="handleAction('copy')">Copy</button>
          <button onclick="handleAction('paste')">Paste</button>
        </rc-menu>
      </div>

      <div class="demo-section">
        <h2>Menu with Disabled Items</h2>
        <rc-menu label="File Actions">
          <button onclick="handleAction('new')">New</button>
          <button onclick="handleAction('open')">Open</button>
          <button onclick="handleAction('save')" disabled>Save</button>
          <button onclick="handleAction('close')">Close</button>
        </rc-menu>
      </div>

      <div class="demo-section">
        <h2>Icon + Text Items</h2>
        <p>
          <code>all: unset</code> resets <code>display</code> to <code>inline</code>, breaking
          inline SVG layout. Fix: add <code>display: flex; align-items: center</code> after the
          unset — see <code>.has-icon</code> in the page styles.
        </p>
        <rc-menu label="Edit Actions">
          <button class="has-icon" onclick="handleAction('undo')">
            <svg viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
              <path d="M5.5 5.5A.5.5 0 0 1 6 6v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm2.5 0a.5.5 0 0 1 .5.5v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5z"/>
              <path fill-rule="evenodd" d="M14.5 3a1 1 0 0 1-1 1H13v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4h-.5a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1H6a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1h3.5a1 1 0 0 1 1 1v1z"/>
            </svg>
            Undo
          </button>
          <button class="has-icon" onclick="handleAction('redo')">
            <svg viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
              <path d="M8 3a5 5 0 1 0 4.546 2.914.5.5 0 0 1 .908-.417A6 6 0 1 1 8 2v1z"/>
              <path d="M8 4.466V.534a.25.25 0 0 1 .41-.192l2.36 1.966c.12.1.12.284 0 .384L8.41 4.658A.25.25 0 0 1 8 4.466z"/>
            </svg>
            Redo
          </button>
          <button class="has-icon" onclick="handleAction('cut')">
            <svg viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
              <path d="M3.5 3.5c-.614-.884-.074-1.962.858-2.5L8 7.226 11.642 1c.932.538 1.472 1.616.858 2.5L8.81 8.61l1.556 2.661a2.5 2.5 0 1 1-.794.637L8 9.73l-1.572 2.177a2.5 2.5 0 1 1-.794-.637L7.19 8.61 3.5 3.5zm2.5 10a1 1 0 1 0-2 0 1 1 0 0 0 2 0zm7 0a1 1 0 1 0-2 0 1 1 0 0 0 2 0z"/>
            </svg>
            Cut
          </button>
          <button class="has-icon" onclick="handleAction('copy')">
            <svg viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
              <path d="M4 1.5H3a2 2 0 0 0-2 2V14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V3.5a2 2 0 0 0-2-2h-1v1h1a1 1 0 0 1 1 1V14a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V3.5a1 1 0 0 1 1-1h1v-1z"/>
              <path d="M9.5 1a.5.5 0 0 1 .5.5v1a.5.5 0 0 1-.5.5h-3a.5.5 0 0 1-.5-.5v-1a.5.5 0 0 1 .5-.5h3zm-3-1A1.5 1.5 0 0 0 5 1.5v1A1.5 1.5 0 0 0 6.5 4h3A1.5 1.5 0 0 0 11 2.5v-1A1.5 1.5 0 0 0 9.5 0h-3z"/>
            </svg>
            Copy
          </button>
          <button class="has-icon" onclick="handleAction('paste')" disabled>
            <svg viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
              <path d="M5 1.5A1.5 1.5 0 0 1 6.5 0h3A1.5 1.5 0 0 1 11 1.5v1A1.5 1.5 0 0 1 9.5 4h-3A1.5 1.5 0 0 1 5 2.5v-1zm1.5-.5a.5.5 0 0 0-.5.5v1a.5.5 0 0 0 .5.5h3a.5.5 0 0 0 .5-.5v-1a.5.5 0 0 0-.5-.5h-3zM3 4a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2H9v1h4a1 1 0 0 1 1 1v8a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V6a1 1 0 0 1 1-1h4V4H3z"/>
            </svg>
            Paste
          </button>
        </rc-menu>
      </div>
    </main>

    <script>
      window.handleAction = function (action) {
        console.log('Action:', action);
      };

      document.querySelectorAll('rc-menu').forEach((menu) => {
        menu.addEventListener('rc-menu-activate', (e) => {
          console.log('rc-menu-activate:', e.detail.item.textContent.trim());
        });
        menu.addEventListener('rc-menu-close', () => {
          console.log('rc-menu-close');
        });
      });
    </script>
  </body>
</html>
