<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>rc-menubar</title>
    <link rel="stylesheet" href="/demo.css" />
    <script type="module" src="/demo.js"></script>
    <script type="module" src="/src/define.ts"></script>
    <style>
      rc-menubar {
        border: 1px solid ButtonBorder;
        border-radius: 4px;
        --rc-menubar-padding-inline: 4px;
        --rc-menubar-padding-block: 4px;
      }

      .menu-trigger {
        padding: 0.4em 0.85em;
        font-size: 0.95rem;
        cursor: pointer;
        border: none;
        background: transparent;
        border-radius: 3px;
      }
      .menu-trigger:hover { background: color-mix(in srgb, currentColor 10%, transparent); }
      .menu-trigger:focus-visible { outline: 2px solid Highlight; outline-offset: -2px; }

      rc-menu button {
        all: unset;
        display: block;
        width: 100%;
        box-sizing: border-box;
        padding: 0.5em 1em;
        cursor: pointer;
      }
      rc-menu button:hover { background: color-mix(in srgb, currentColor 10%, transparent); }
      rc-menu button:focus-visible { outline: 2px solid Highlight; outline-offset: -2px; }
      rc-menu button[disabled] { opacity: 0.5; cursor: not-allowed; }

      #status {
        margin-top: 1rem;
        padding: 0.75rem 1rem;
        background: Canvas;
        border: 1px solid ButtonBorder;
        border-radius: 4px;
        font-family: monospace;
        font-size: 0.875rem;
      }

      .vertical-demo rc-menubar { display: inline-flex; }
    </style>
  </head>
  <body>
    <main class="demo-page">
      <div class="demo-controls">
        <div class="demo-title">
          <h1>rc-menubar</h1>
          <a href="https://www.w3.org/WAI/ARIA/apg/patterns/menubar/">WAI-ARIA Menubar Pattern</a>
        </div>
        <button class="theme-picker" type="button">Auto</button>
      </div>

      <div class="demo-section">
        <h2>Application Menubar</h2>
        <rc-menubar label="Application Menu">
          <rc-menu-button>
            <button slot="trigger" class="menu-trigger">File</button>
            <rc-menu label="File">
              <button onclick="handleAction('new')">New</button>
              <button onclick="handleAction('open')">Open…</button>
              <button onclick="handleAction('save')" disabled>Save</button>
              <button onclick="handleAction('close')">Close</button>
            </rc-menu>
          </rc-menu-button>
          <rc-menu-button>
            <button slot="trigger" class="menu-trigger">Edit</button>
            <rc-menu label="Edit">
              <button onclick="handleAction('undo')">Undo</button>
              <button onclick="handleAction('redo')">Redo</button>
              <button onclick="handleAction('cut')">Cut</button>
              <button onclick="handleAction('copy')">Copy</button>
              <button onclick="handleAction('paste')">Paste</button>
            </rc-menu>
          </rc-menu-button>
          <rc-menu-button>
            <button slot="trigger" class="menu-trigger">View</button>
            <rc-menu label="View">
              <button onclick="handleAction('zoom-in')">Zoom In</button>
              <button onclick="handleAction('zoom-out')">Zoom Out</button>
              <button onclick="handleAction('reset-zoom')">Reset Zoom</button>
            </rc-menu>
          </rc-menu-button>
          <rc-menu-button>
            <button slot="trigger" class="menu-trigger">Help</button>
            <rc-menu label="Help">
              <button onclick="handleAction('documentation')">Documentation</button>
              <button onclick="handleAction('about')">About</button>
            </rc-menu>
          </rc-menu-button>
        </rc-menubar>
      </div>

      <div class="demo-section vertical-demo">
        <h2>Vertical Menubar</h2>
        <rc-menubar label="Vertical Menu" orientation="vertical">
          <rc-menu-button>
            <button slot="trigger" class="menu-trigger">Options</button>
            <rc-menu label="Options">
              <button onclick="handleAction('option-1')">Option 1</button>
              <button onclick="handleAction('option-2')">Option 2</button>
            </rc-menu>
          </rc-menu-button>
          <rc-menu-button>
            <button slot="trigger" class="menu-trigger">Settings</button>
            <rc-menu label="Settings">
              <button onclick="handleAction('preferences')">Preferences</button>
              <button onclick="handleAction('account')">Account</button>
            </rc-menu>
          </rc-menu-button>
        </rc-menubar>
      </div>

      <div class="demo-section">
        <h2>Document Editor Menubar</h2>
        <p>Realistic editor structure. Disabled items reflect state (nothing open yet).</p>
        <rc-menubar label="Document Editor">
          <rc-menu-button>
            <button slot="trigger" class="menu-trigger">Format</button>
            <rc-menu label="Format">
              <button onclick="handleAction('bold')">Bold</button>
              <button onclick="handleAction('italic')">Italic</button>
              <button onclick="handleAction('underline')">Underline</button>
              <button onclick="handleAction('strikethrough')" disabled>Strikethrough</button>
              <button onclick="handleAction('code')">Inline code</button>
            </rc-menu>
          </rc-menu-button>
          <rc-menu-button>
            <button slot="trigger" class="menu-trigger">Insert</button>
            <rc-menu label="Insert">
              <button onclick="handleAction('image')">Image…</button>
              <button onclick="handleAction('link')">Link…</button>
              <button onclick="handleAction('table')">Table</button>
              <button onclick="handleAction('hr')">Horizontal rule</button>
            </rc-menu>
          </rc-menu-button>
          <rc-menu-button>
            <button slot="trigger" class="menu-trigger">View</button>
            <rc-menu label="View">
              <button onclick="handleAction('outline')">Outline</button>
              <button onclick="handleAction('word-count')">Word count</button>
              <button onclick="handleAction('focus-mode')">Focus mode</button>
              <button onclick="handleAction('fullscreen')">Full screen</button>
            </rc-menu>
          </rc-menu-button>
        </rc-menubar>
      </div>

      <div id="status">Status: Ready</div>
    </main>

    <script>
      const status = document.getElementById('status');

      window.handleAction = function (action) {
        status.textContent = `Status: "${action}" triggered`;
        console.log('Action:', action);
      };

      document.querySelectorAll('rc-menu-button').forEach((mb) => {
        mb.addEventListener('rc-menu-button-toggle', (e) => {
          const state = e.detail.open ? 'opened' : 'closed';
          console.log(`Menu ${state}:`, mb.querySelector('[slot="trigger"]').textContent.trim());
        });
      });

      document.querySelectorAll('rc-menu').forEach((menu) => {
        menu.addEventListener('rc-menu-activate', (e) => {
          console.log('Menu item activated:', e.detail.item.textContent.trim());
        });
      });
    </script>
  </body>
</html>
