<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>rc-range-slider</title>
    <link rel="stylesheet" href="/demo.css" />
    <script type="module" src="/demo.js"></script>
    <script type="module" src="/src/define.ts"></script>
    <style>
      rc-range-slider {
        display: block;
        max-width: 400px;
      }

      .rc-range-slider-label {
        display: block;
        font-size: 0.875rem;
        font-weight: 500;
        margin-block-end: 0.4em;
      }

      /* Group: stacking context for the two native inputs */
      .rc-range-slider-group {
        position: relative;
        height: 24px;
      }

      .rc-range-slider-track {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        pointer-events: none;
      }

      .rc-range-slider-track::before {
        content: '';
        display: block;
        width: 100%;
        height: 6px;
        background: var(--rc-track-bg, light-dark(rgba(0,0,0,0.18), rgba(255,255,255,0.22)));
        border-radius: 3px;
      }

      .rc-range-slider-range {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        height: 6px;
        background: var(--rc-accent, Highlight);
        border-radius: 3px;
        pointer-events: none;
      }

      /* Stacked native inputs — z-index is managed by the component */
      .rc-range-slider-input {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        margin: 0;
        appearance: none;
        background: transparent;
        cursor: pointer;
      }

      /* Hide native track — .rc-range-slider-track provides the visual */
      .rc-range-slider-input::-webkit-slider-runnable-track {
        height: 6px;
        background: transparent;
        border: none;
      }

      .rc-range-slider-input::-moz-range-track {
        height: 6px;
        background: transparent;
        border: none;
      }

      /* Thumb */
      .rc-range-slider-input::-webkit-slider-thumb {
        appearance: none;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: ButtonFace;
        border: 2px solid var(--rc-accent, Highlight);
        cursor: ew-resize;
        margin-top: -6px;
      }

      .rc-range-slider-input::-moz-range-thumb {
        appearance: none;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: ButtonFace;
        border: 2px solid var(--rc-accent, Highlight);
        cursor: ew-resize;
      }

      /* Hover state */
      .rc-range-slider-input:not(:disabled):hover::-webkit-slider-thumb {
        background: var(--rc-accent, Highlight);
      }

      .rc-range-slider-input:not(:disabled):hover::-moz-range-thumb {
        background: var(--rc-accent, Highlight);
      }

      /* Focus ring on thumb */
      .rc-range-slider-input:focus-visible {
        outline: none;
      }

      .rc-range-slider-input:focus-visible::-webkit-slider-thumb {
        outline: 2px solid Highlight;
        outline-offset: 2px;
      }

      .rc-range-slider-input:focus-visible::-moz-range-thumb {
        outline: 2px solid Highlight;
        outline-offset: 2px;
      }

      /* Disabled state */
      rc-range-slider[disabled] .rc-range-slider-group {
        opacity: 0.6;
        cursor: not-allowed;
      }

      rc-range-slider[disabled] .rc-range-slider-input {
        cursor: not-allowed;
      }

      rc-range-slider[disabled] .rc-range-slider-input::-webkit-slider-thumb {
        border-color: GrayText;
        background: ButtonFace;
        cursor: not-allowed;
      }

      rc-range-slider[disabled] .rc-range-slider-input::-moz-range-thumb {
        border-color: GrayText;
        background: ButtonFace;
        cursor: not-allowed;
      }

      rc-range-slider[disabled] .rc-range-slider-range {
        background: GrayText;
      }

      .rc-range-slider-value {
        font-size: 0.75rem;
        font-variant-numeric: tabular-nums;
        position: absolute;
        top: -1.4em;
        left: 50%;
        transform: translateX(-50%);
        white-space: nowrap;
        color: GrayText;
      }

      /* Vertical orientation */
      rc-range-slider[orientation="vertical"] {
        max-width: none;
        display: inline-block;
      }

      rc-range-slider[orientation="vertical"] .rc-range-slider-group {
        width: 24px;
        height: 200px;
      }

      rc-range-slider[orientation="vertical"] .rc-range-slider-track {
        flex-direction: column;
        justify-content: center;
        align-items: center;
      }

      rc-range-slider[orientation="vertical"] .rc-range-slider-track::before {
        width: 6px;
        height: 100%;
      }

      rc-range-slider[orientation="vertical"] .rc-range-slider-range {
        top: auto;
        transform: none;
        width: 6px;
        height: auto;
      }

      rc-range-slider[orientation="vertical"] .rc-range-slider-input {
        writing-mode: vertical-lr;
        direction: rtl;
      }

      rc-range-slider[orientation="vertical"] .rc-range-slider-input::-webkit-slider-runnable-track {
        width: 6px;
        height: auto;
      }

      rc-range-slider[orientation="vertical"] .rc-range-slider-input::-webkit-slider-thumb {
        cursor: ns-resize;
        margin-top: 0;
        margin-left: -6px;
      }

      rc-range-slider[orientation="vertical"] .rc-range-slider-input::-moz-range-thumb {
        cursor: ns-resize;
      }
    </style>
  </head>
  <body>
    <main class="demo-page">
      <div class="demo-controls">
        <div class="demo-title">
          <h1>rc-range-slider</h1>
          <a href="https://www.w3.org/WAI/ARIA/apg/patterns/slider-multithumb/">WAI-ARIA Multi-Thumb Slider Pattern</a>
        </div>
        <button class="theme-picker" type="button">Auto</button>
      </div>

      <div class="demo-section">
        <h2>Basic</h2>
        <p>Two thumbs define a low/high range. Use arrow keys on a focused thumb to adjust its value.</p>
        <rc-range-slider
          id="basic-range"
          label="Price range"
          low-label="Minimum price"
          high-label="Maximum price"
        ></rc-range-slider>
        <p id="basic-range-output" style="font-size: 0.875rem; color: GrayText;">$0 – $100</p>
      </div>

      <div class="demo-section">
        <h2>With Value Display</h2>
        <rc-range-slider
          id="display-range"
          label="Year range"
          low-label="Start year"
          high-label="End year"
          min="2000"
          max="2030"
          display="overlay"
        ></rc-range-slider>
      </div>

      <div class="demo-section">
        <h2>Disabled</h2>
        <rc-range-slider
          label="Disabled range"
          disabled
        ></rc-range-slider>
      </div>

      <div class="demo-section">
        <h2>Vertical</h2>
        <rc-range-slider
          label="Vertical range"
          orientation="vertical"
          min="0"
          max="100"
        ></rc-range-slider>
      </div>
    </main>

    <script>
      customElements.whenDefined('rc-range-slider').then(() => {
        // Set a meaningful initial spread for the year-range example
        document.getElementById('display-range').value = [2010, 2025];

        // Wire value display to the basic example
        const basic = document.getElementById('basic-range');
        const output = document.getElementById('basic-range-output');
        basic.addEventListener('rc-range-slider-input', (e) => {
          output.textContent = `$${e.detail.value[0]} – $${e.detail.value[1]}`;
        });
      });
    </script>
  </body>
</html>
